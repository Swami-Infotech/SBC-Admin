<div class="login-container">
  <div class="bg-sections">
    <div class="section"></div>
  </div>

  <div class="login-card">
    <div class="logo-container">
      <img src="assets/logo/logo.png" alt="Team SBC Logo" class="logo">
    </div>

    <h1 class="login-title">Login</h1>

    <form (ngSubmit)="onLogin()" [formGroup]="LoginForm" class="login-form">
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
        <input 
          type="email" 
          class="form-control" 
          placeholder="Email" 
          name="email" 
          formControlName="email"
          required
        >
      </div>

      <div class="input-group mb-4">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          class="form-control" 
          placeholder="Password" 
          name="password" 
          formControlName="password"
          required
        >
        <span class="input-group-text password-toggle" (click)="togglePassword()">
          <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
        </span>
      </div>

      <button type="submit" class="btn btn-login w-100">Login</button>
    </form>
  </div>
</div>
