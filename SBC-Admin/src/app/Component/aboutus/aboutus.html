<!-- header section start -->
<div class="header">
    <div class="container">
        <div class="row">
            <div class="col-lg-6">
                <div class="heder-title">
                    <h2>About Us</h2>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="search d-flex flex-wrap align-items-center justify-content-end  ">
                    <div class="search-box">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" placeholder="Search..." />
                    </div>
                    <div class="add-btn ms-3 pe-auto" (click)="Addabout()">
                        <button class="btn">Add About</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
<!-- header section end -->

<!-- ride management table start -->
<div class="container">
    <div class="row">
        <div class="col-lg-12">
            <div class="table-container">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Sr No</th>
                            <th>Key</th>
                            <th>Value</th>
                            <th>Type</th>
                            <th>Place</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let d of about;let i = index">
                            <td> {{i + 1}} </td>
                            <td>{{d.key}}</td>
                            <td>
                                <ng-container [ngSwitch]="true">
                                    <!-- Display Image if type is Image (2 or 1 depending on API) OR if value starts with http or data:image -->
                                    <div *ngSwitchCase="d.aboutusType == 2 || d.aboutusType == 1 || d.value.startsWith('http') || d.value.startsWith('data:image')">
                                        <img [src]="d.value.startsWith('http') ? d.value : 'data:image/png;base64,' + d.value" 
                                             style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px;" alt="About Image">
                                    </div>
                                    <!-- Display Badge for Video -->
                                    <span *ngSwitchCase="d.aboutusType == 3 || d.aboutusType == 2">
                                        <span class="badge bg-secondary">Video/Media Content</span>
                                    </span>
                                    <!-- Fallback to Text -->
                                    <span *ngSwitchDefault [innerHTML]="d.value"></span>
                                </ng-container>
                            </td>
                            <td>
                                <span *ngIf="d.aboutusType == 0">Text</span>
                                <span *ngIf="d.aboutusType == 1">Image</span>
                                <span *ngIf="d.aboutusType == 2">Video</span>
                            </td>
                            <td>
                                <span *ngIf="d.dataPlace == 0">HomePage</span>
                                <span *ngIf="d.dataPlace == 1">AboutusPage</span>
                                <span *ngIf="d.dataPlace == 2">Other</span>
                            </td>
                            <td class="action-btns">
                                <i class="bi bi-eye"></i>
                                <i class="bi bi-pencil" (click)="Editabout(d)"></i>
                                <i class="bi bi-trash-fill delete" (click)="deleteabout(d.aboutID)"></i>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<!-- ride management table end -->
