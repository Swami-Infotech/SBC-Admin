<div class="container p-4">
    <div class="header">
        <div class="container">
            <div class="row">
                <div class="col-lg-6">
                    <div class="header-title">
                        <h2>Ride Sefty</h2>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="search d-flex flex-wrap align-items-center justify-content-end  ">
                    <div class="search-box">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" placeholder="Search..." />
                    </div>
                    <div class="add-btn ms-3 pe-auto" (click)="OpenModal()">
                        <button class="btn">Add Ride Sefty</button>
                    </div>
                </div>
                </div>
            </div>
        </div>
    </div>


    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="table-container">
                    <table class="custom-table">
                        <thead>
                            <tr>
                                <th>Sr.No</th>
                                <th>Title</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr *ngFor="let d of ride;let i = index">
                                <td>{{i + 1}}</td>
                                <td>{{d.safetyText}}</td>
                                <td class="action-btns">
                                    <i class="bi bi-pencil" (click)="updateride(d)"></i>
                                    <i class="bi bi-trash-fill delete" (click)="deleteride(d.rideSafetyID)"></i>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- add ride modal start -->
<div class="modal" [class.show]="isopenmodal" [style.display]="isopenmodal ? 'block' : 'none'">

    <div class="modal-dialog">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5>Add Slider</h5>
                <button class="btn-close" (click)="closeModal()">✕</button>
            </div>

            <!-- BODY -->
            <div class="modal-body">
                <form class="user-form" [formGroup]="rideForm">

                    <div class="row">
                        <!--Title -->
                        <div class="col-md-12 ">
                            <label>Title</label>
                            <div class="custom-input">
                               <i class="bi bi-sign-turn-slight-right-fill"></i>
                                <input type="text" placeholder="Enter Title" formControlName="safetyText">
                            </div>
                        </div>

                    </div>
                </form>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
                <button class="cancel-btn" (click)="closeModal()">Cancel</button>
                <button class="save-btn" (click)="AddRide()">Save</button>
            </div>

        </div>
    </div>
</div>

<!-- SINGLE BACKDROP -->
<div class="modal-backdrop" *ngIf="isopenmodal"></div>
<!-- add ride modal end -->
