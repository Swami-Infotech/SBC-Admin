<div class="loader-overlay" *ngIf="loaderService.isLoading | async">
  <div class="loader-content">
    <div class="bike-wrapper">
      <div class="motorcycle">
        <div class="smoke"></div>
        <div class="smoke"></div>
        <div class="smoke"></div>
        <div class="wheel back"></div>
        <div class="exhaust"></div>
        <div class="bike-body">
          <div class="seat"></div>
          <div class="rider"></div>
          <div class="tank"></div>
        </div>
        <div class="handle"></div>
        <div class="wheel front"></div>
        <div class="light"></div>
      </div>
    </div>
    <div class="road"></div>
    <p class="loading-msg">Let's Ride...</p>
  </div>
</div>
