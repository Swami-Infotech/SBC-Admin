<div class="container p-4">
   <div class="header">
    <div class="container">
        <div class="row">
            <div class="col-lg-6">
                <div class="heder-title">
                    <h2>Slider</h2>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="search d-flex flex-wrap align-items-center justify-content-end  ">
                    <div class="search-box">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" placeholder="Search..." />
                    </div>
                    <div class="add-btn ms-3 pe-auto" (click)="OpenModal()">
                        <button class="btn">Add slider</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="table-container">
                    <table class="custom-table">
                        <thead>
                            <tr>
                                <th>Sr No</th>
                                <th>Image</th>
                                <th>Redirect To</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr *ngFor="let d of slider;let i = index">
                                <td> {{i + 1}} </td>
                                <td>
                                    <img [src]="d.sliderImage" alt="">
                                </td>
                                <td>{{d.redirectTo}}</td>
                                <td class="action-btns">
                                    <i class="bi bi-pencil" (click)="updateslider(d)"></i>
                                    <i class="bi bi-trash-fill delete" (click)="deleteslider(d.sliderID)"></i>
                                </td>
                            </tr>
                           
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- add ride modal start -->
<div class="modal" [class.show]="isModalOpen" [style.display]="isModalOpen ? 'block' : 'none'">

    <div class="modal-dialog">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5>Add Slider</h5>
                <button class="btn-close" (click)="closeModal()">✕</button>
            </div>

            <!-- BODY -->
            <div class="modal-body">
                <form class="user-form" [formGroup]="SliderForm">

                    <div class="row">

                        <!-- Ride Name -->
                        <div class="col-md-12">
                            <label>Image</label>
                            <div class="custom-input">
                               <i class="bi bi-card-image"></i>
                                <input type="file" placeholder="slider Image" (change)="fileChangeEvents($event)">
                            </div>
                        </div>
                         <!-- image preview -->
                        <div class="col-md-12 mt-3" *ngIf="SliderForm.value.sliderImage">
                            <label>Preview</label>
                            <div class="image-preview">
                                <img [src]="SliderForm.value.sliderImage" alt="Preview" class="img-fluid rounded shadow-sm">
                            </div>
                        </div>

                        <!-- Date -->
                        <div class="col-md-12 ">
                            <label>Redirect To</label>
                            <div class="custom-input">
                               <i class="bi bi-sign-turn-slight-right-fill"></i>
                                <input type="text" placeholder="Select Date" formControlName="redirectTo">
                            </div>
                        </div>

                    </div>
                </form>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
                <button class="cancel-btn" (click)="closeModal()">Cancel</button>
                <button class="save-btn" (click)="AddSlider()">Save</button>
            </div>

        </div>
    </div>
</div>

<!-- SINGLE BACKDROP -->
<div class="modal-backdrop" *ngIf="isModalOpen"></div>
<!-- add ride modal end -->
