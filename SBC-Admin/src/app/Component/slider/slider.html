<div class="container p-4">

                        <input type="text" placeholder="Search..." />
                    </div>
                    <div class="add-btn ms-3 pe-auto" (click)="OpenModal()">
                        <button class="btn">Add slider</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

    <div class="container">

                                <th>Sr No</th>

                        </thead>

                        <tbody>
                            <tr>

                                </td>

                                <td class="action-btns">

                                    <i class="bi bi-pencil"></i>

                            </tr>
                            <tr>
                                <td> 2 </td>
                                <td>
                                    <img src="../../../assets/logo/team1.png" alt="">
                                </td>
                                <td>www.google.com</td>
                                <td class="action-btns">
                                    <i class="bi bi-eye-fill view pe-auto"></i>
                                    <i class="bi bi-pencil"></i>
                                    <i class="bi bi-trash-fill delete"></i>
                                </td>
                            </tr>
                            <tr>
                                <td> 3 </td>
                                <td>
                                    <img src="../../../assets/logo/team1.png" alt="">
                                </td>
                                <td>www.google.com</td>
                                <td class="action-btns">
                                    <i class="bi bi-eye-fill view"></i>
                                    <i class="bi bi-pencil"></i>

                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- add ride modal start -->
<div class="modal" [class.show]="isModalOpen" [style.display]="isModalOpen ? 'block' : 'none'">

    <div class="modal-dialog">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5>Add Slider</h5>
                <button class="btn-close" (click)="closeModal()">✕</button>
            </div>

            <!-- BODY -->
            <div class="modal-body">
                <form class="user-form">

                    <div class="row">

                        <!-- Ride Name -->
                        <div class="col-md-12">
                            <label>Image</label>
                            <div class="custom-input">
                               <i class="bi bi-card-image"></i>
                                <input type="text" placeholder="slider Image">
                            </div>
                        </div>

                        <!-- Date -->
                        <div class="col-md-12 ">
                            <label>Redirect To</label>
                            <div class="custom-input">
                               <i class="bi bi-sign-turn-slight-right-fill"></i>
                                <input type="text" placeholder="Select Date">
                            </div>
                        </div>

                    </div>
                </form>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
                <button class="cancel-btn" (click)="closeModal()">Cancel</button>
                <button class="save-btn">Save</button>
            </div>

        </div>
    </div>
</div>

<!-- SINGLE BACKDROP -->
<div class="modal-backdrop" *ngIf="isModalOpen"></div>
<!-- add ride modal end -->
