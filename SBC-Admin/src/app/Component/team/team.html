<div class="container p-4">
    <div class="header">
        <div class="container">
            <div class="row">
                <div class="col-lg-6">
                    <div class="heder-title">
                        <h2>Add Team</h2>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="search d-flex flex-wrap align-items-center justify-content-end  ">
                        <div class="search-box">
                            <i class="bi bi-search search-icon"></i>
                            <input type="text" placeholder="Search..." [(ngModel)]="searchTerm" />
                        </div>
                        <div class="add-btn ms-3 pe-auto" (click)="OpenModal()">
                            <button class="btn">Add Team</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-12">
        <div class="table-container">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Sr No</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Phone </th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let d of filteredTeam; let i = index">
                        <td> {{i + 1}} </td>
                        <td>
                            <img [src]="d.memberImage" alt="">
                        </td>
                        <td>{{d.memberName}}</td>
                        <td>{{d.memberRole}}</td>
                        <td>{{d.instagramLink}}</td>
                        <td class="action-btns">
                            <i class="bi bi-pencil" (click)="editteam(d)"></i>
                            <i class="bi bi-trash-fill delete" (click)="deleteteam(d.coreTeamMemberID)"></i>
                        </td>
                    </tr>
                    <tr *ngIf="filteredTeam.length === 0">
                        <td colspan="6" class="text-center py-4">No team members found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>


    <!-- add Team model start -->
    <div class="modal" [class.show]="isModalOpen" [style.display]="isModalOpen ? 'block' : 'none'">

        <div class="modal-dialog">
            <div class="modal-content">

                <!-- HEADER -->
                <div class="modal-header">
                    <h5>{{iseditmodal ? 'Update Team Member' : 'Add Team Member'}}</h5>
                    <button class="btn-close" (click)="closeModal()">✕</button>
                </div>

                <!-- BODY -->
                <div class="modal-body">
                    <form [formGroup]="TeamForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark small mb-1">Image</label>
                            <div class="custom-input"><i
                                        class="bi bi-image"></i>
                                <input type="file" class="form-control border-start-0 ps-0 shadow-none"
                                    placeholder="Upload Image" (change)="fileChangeEvents($event)">
                            </div>
                            <div *ngIf="imagePreview" class="mt-2">
                                <img [src]="imagePreview" class="preview-image" alt="Preview">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark small mb-1">Name</label>
                            <div class="custom-input"><i
                                        class="bi bi-person"></i>
                                <input type="text" class="form-control border-start-0 ps-0 shadow-none"
                                    placeholder="Enter Name" formControlName="memberName">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark small mb-1">Role</label>
                            <div class="custom-input">
                                    <i class="bi bi-person-badge"></i>
                                <input type="text" class="form-control border-start-0 ps-0 shadow-none" placeholder="Enter Member Role" formControlName="memberRole">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark small mb-1">Instagram Link</label>
                            <div class="custom-input"><i
                                        class="bi bi-telephone"></i>
                                <input type="tel" class="form-control border-start-0 ps-0 shadow-none"
                                    placeholder="Enter instagram link" formControlName="instagramLink">
                            </div>
                        </div>
                    </form>
                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <button class="cancel-btn" (click)="closeModal()">Cancel</button>
                    <button class="save-btn" (click)="addteam()">{{iseditmodal ? 'Update' : 'Save'}}</button>
                </div>

            </div>
        </div>
    </div>

    <!-- SINGLE BACKDROP -->
    <div class="modal-backdrop" *ngIf="isModalOpen"></div>
    <!-- add Team model end -->
</div>
