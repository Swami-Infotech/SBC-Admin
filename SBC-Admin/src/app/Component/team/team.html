<div class="container p-4">
    <div class="header">
        <div class="container">
            <div class="row">
                <div class="col-lg-6">
                    <div class="heder-title">
                        <h2>Add Team</h2>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="search d-flex flex-wrap align-items-center justify-content-end  ">
                        <div class="search-box">
                            <i class="bi bi-search search-icon"></i>
                            <input type="text" placeholder="Search..." />
                        </div>
                        <div class="add-btn ms-3 pe-auto" (click)="OpenModal()">
                            <button class="btn">Add Team</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-12">
        <div class="table-container">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Sr No</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Phone </th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td> 1 </td>
                        <td>
                            <img src="../../../assets/logo/event.avif" alt="">
                        </td>
                        <td>Raj Patel</td>
                        <td>Ride Leader</td>
                        <td>+91 9876543210</td>
                        <td class="action-btns">
                            <i class="bi bi-pencil"></i>
                            <i class="bi bi-trash-fill delete"></i>
                        </td>
                    </tr>
                    <tr>
                        <td> 2 </td>
                        <td>
                            <img src="../../../assets/logo/event.avif" alt="">
                        </td>
                        <td>Raj Patel</td>
                        <td>Ride Leader</td>
                        <td>+91 9876543210</td>
                        <td class="action-btns">
                            <i class="bi bi-pencil"></i>
                            <i class="bi bi-trash-fill delete"></i>
                        </td>
                    </tr>

                    <tr>
                        <td> 3 </td>
                        <td>
                            <img src="../../../assets/logo/event.avif" alt="">
                        </td>
                        <td>Raj Patel</td>
                        <td>Ride Leader</td>
                        <td>+91 9876543210</td>
                        <td class="action-btns">
                            <i class="bi bi-pencil"></i>
                            <i class="bi bi-trash-fill delete"></i>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>


    <!-- add Team model start -->
    <div class="modal" [class.show]="isModalOpen" [style.display]="isModalOpen ? 'block' : 'none'">

        <div class="modal-dialog">
            <div class="modal-content">

                <!-- HEADER -->
                <div class="modal-header">
                    <h5>Add Gallery</h5>
                    <button class="btn-close" (click)="closeModal()">✕</button>
                </div>

                <!-- BODY -->
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark small mb-1">Image</label>
                            <div class="custom-input"><i
                                        class="bi bi-image"></i>
                                <input type="text" class="form-control border-start-0 ps-0 shadow-none"
                                    placeholder="Upload Image" readonly>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark small mb-1">Name</label>
                            <div class="custom-input"><i
                                        class="bi bi-person"></i>
                                <input type="text" class="form-control border-start-0 ps-0 shadow-none"
                                    placeholder="Enter Name">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-dark small mb-1">Role</label>
                            <div class="custom-input">
                                    <i class="bi bi-person-badge"></i>
                                <select class="form-select border-start-0 ps-0 shadow-none text-muted">
                                    <option selected disabled>Select Role</option>
                                    <option value="1">Ride Leader</option>
                                    <option value="2">Admin</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark small mb-1">Phone Number</label>
                            <div class="custom-input"><i
                                        class="bi bi-telephone"></i>
                                <input type="tel" class="form-control border-start-0 ps-0 shadow-none"
                                    placeholder="Enter Phone Number">
                            </div>
                        </div>
                    </form>
                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <button class="cancel-btn" (click)="closeModal()">Cancel</button>
                    <button class="save-btn">Save</button>
                </div>

            </div>
        </div>
    </div>

    <!-- SINGLE BACKDROP -->
    <div class="modal-backdrop" *ngIf="isModalOpen"></div>
    <!-- add Team model end -->
</div>
