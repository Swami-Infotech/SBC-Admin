<div class="header">
    <div class="container">
        <div class="row">
            <div class="col-lg-6">
                <div class="heder-title">
                    <h2>Notification Management</h2>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="search d-flex flex-wrap align-items-center justify-content-end  ">
                    <div class="search-box">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" placeholder="Search..." [(ngModel)]="searchTerm" />
                    </div>
                    <div class="add-btn ms-3 pe-auto" (click)="AddNoti()">
                        <button class="btn">Add Notification</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="row">
        <div class="col-lg-12">
            <div class="table-container">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Sr No</th>
                            <th>Title</th>
                            <th>Description</th>
                            <th>Is All</th>
                            <th>Target User</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let item of filteredNotificationList; let i = index">
                            <td>{{ i + 1 }}</td>
                            <td>{{ item.notificationTitle }}</td>
                            <td>{{ item.description }}</td>
                            <td>
                                <span class="badge" [ngClass]="item.isAll ? 'bg-success' : 'bg-primary'">
                                    {{ item.isAll ? 'All Users' : 'Single User' }}
                                </span>
                            </td>
                            <td>
                                <span *ngIf="!item.isAll">{{ getUserName(item.userID) }}</span>
                                <span *ngIf="item.isAll" class="text-muted small">N/A</span>
                            </td>
                            <td class="action-btns">
                                <i class="bi bi-pencil" (click)="editNotification(item)"></i>
                                <i class="bi bi-trash-fill delete" (click)="deleteNotification(item.notificationID)"></i>
                            </td>
                        </tr>
                        <tr *ngIf="notificationList.length === 0">
                            <td colspan="6" class="text-center py-4">No notifications found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Notification Modal -->
<div class="modal fade show" *ngIf="isShowModal" style="display: block; background: rgba(0,0,0,0.5);">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
            <div class="modal-header bg-light border-0 py-3">
                <h5 class="modal-title fw-bold">{{ iseditmodal ? 'Update' : 'Add' }} Notification</h5>
                <button type="button" class="btn-close" (click)="closeModal()"></button>
            </div>
            <div class="modal-body p-4">
                <form [formGroup]="NotiForm" (ngSubmit)="saveNotification()">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold small">Notification Title</label>
                            <div class="custom-input">
                                <i class="bi bi-type"></i>
                                <input type="text" placeholder="Enter Title" formControlName="notificationTitle">
                            </div>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold small">Description</label>
                            <div class="custom-input">
                                <i class="bi bi-card-text"></i>
                                <input type="text" placeholder="Enter Description" formControlName="description">
                            </div>
                        </div>

                        <div class="col-md-12 mb-3">
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" formControlName="isAll" id="isAllUsers">
                                <label class="form-check-label fw-bold small" for="isAllUsers">Send to All Users</label>
                            </div>
                        </div>

                        <div class="col-md-12 mb-3" *ngIf="!NotiForm.get('isAll')?.value">
                            <label class="form-label fw-bold small">Select User</label>
                            <div class="custom-input">
                                <i class="bi bi-person"></i>
                                <select formControlName="userID">
                                    <option [value]="0">Select User</option>
                                    <option *ngFor="let d of user" [value]="d.userID">{{d.userName}}</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer border-0 p-0 mt-4">
                        <button type="button" class="btn btn-light px-4" (click)="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-dark px-5">{{ iseditmodal ? 'Update' : 'Save' }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
