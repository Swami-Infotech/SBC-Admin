<!-- header section start -->
<div class="header">
    <div class="container">
        <div class="row">
            <div class="col-lg-6">
                <div class="heder-title">
                    <h2>Gallery</h2>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="search d-flex flex-wrap align-items-center justify-content-end  ">
                    <div class="search-box">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" placeholder="Search..." [(ngModel)]="searchTerm" />
                    </div>
                    <div class="add-btn ms-3 pe-auto" (click)="OpenModal()">
                        <button class="btn">Add gallery</button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
<!-- header section end -->

<!-- gallery table start -->
 <div class="container">
    <div class="row">
        <div class="col-lg-12">
            <div class="table-container">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Sr No</th>
                            <th>Image</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let d of filteredGallery; let i = index">
                            <td> {{i + 1}} </td>
                            <td>
                                <img [src]="d.galleryImage" alt="">
                            </td>
                            <td class="action-btns">
                                <i class="bi bi-pencil" (click)="Updategallery(d)"></i>
                                <i class="bi bi-trash-fill delete" (click)="Deletegallery(d.galleryID)"></i>
                            </td>
                        </tr>
                        <tr *ngIf="filteredGallery.length === 0">
                            <td colspan="3" class="text-center py-4">No gallery items found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<!-- gallery table end -->





<!-- add gallery model start -->
 <div class="modal" [class.show]="isModalOpen" [style.display]="isModalOpen ? 'block' : 'none'">

    <div class="modal-dialog">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5>{{isEditOpen ? 'Edit Gallery' : 'Add gallery'}}</h5>
                <button class="btn-close" (click)="closeModal()">✕</button>
            </div>

            <!-- BODY -->
            <div class="modal-body">
                <form class="user-form" [formGroup]="GallaryForm">

                    <div class="row">

                        <!-- image -->
                        <div class="col-md-12">
                            <label>Image</label>
                            <div class="custom-input">
                                <i class="bi bi-card-image"></i>
                                <input type="file" placeholder="Upload Image" (change)="fileChangeEvents($event)">
                            </div>
                        </div>

                        <!-- image preview -->
                        <div class="col-md-12 mt-3" *ngIf="GallaryForm.value.galleryImage">
                            <label>Preview</label>
                            <div class="image-preview">
                                <img [src]="GallaryForm.value.galleryImage" alt="Preview" class="img-fluid rounded shadow-sm">
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
                <button class="cancel-btn" (click)="closeModal()">Cancel</button>
                <button class="save-btn" (click)="AddGallery()">Save</button>
            </div>

        </div>
    </div>
</div>

<!-- SINGLE BACKDROP -->
<div class="modal-backdrop" *ngIf="isModalOpen"></div>
<!-- add gallery model end -->
